apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyecto-frontend
  namespace: proyecto-tfg-2026
  labels:
    app: proyecto-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proyecto-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: proyecto-frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions: 
                    - key: app
                      operator: In
                      values:
                        - proyecto-frontend
                topologyKey: kubernetes.io/hostname  
      containers:
        - name: proyecto-frontend
          image: jcmm13/tfg-frontend:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE 
            seccompProfile:
              type: RuntimeDefault

          ports:
            - containerPort: 8080

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"   # Subimos de 64 a 128
            limits:
              cpu: "250m"      
              memory: "256Mi"   # Subimos de 128 a 256 (El doble de aire)
          
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5

          volumeMounts: 
            - name: cache-volume 
              mountPath: /var/cache/nginx 
            - name: run-volume 
              mountPath: /var/run 

      volumes:
        - name: cache-volume
          emptyDir: {}
        - name: run-volume 
          emptyDir: {}
