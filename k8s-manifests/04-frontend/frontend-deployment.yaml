apiVersion: apps/v1
kind: Deployment
metadata:
  name: proyecto-frontend
  namespace: proyecto-tfg-2026
  labels:
    app: proyecto-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: proyecto-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: proyecto-frontend
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions: 
                    - key: app
                      operator: In
                      values:
                        - proyecto-frontend
                topologyKey: kubernetes.io/hostname  
      containers:
        - name: proyecto-frontend
          image: jcmm13/tfg-frontend:latest
          imagePullPolicy: Always
          # Eliminamos runAsNonRoot para permitir el uso del puerto 80
          securityContext:
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10 
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5