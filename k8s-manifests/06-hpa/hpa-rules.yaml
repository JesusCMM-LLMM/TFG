# HPA del Backend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: proyecto-tfg-2026
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proyecto-backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

---

# HPA del Frontend
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: proyecto-tfg-2026
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proyecto-frontend
  minReplicas: 2
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60