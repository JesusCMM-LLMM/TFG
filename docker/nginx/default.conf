# Usamos nginx como un proxy inverso: 
server {
    listen 80;

    # Si la ruta empieza por /api, va a NestJS
    location /api/ {
        # Nest suele recibir peticiones sin el prefijo /api, 
        # así que hacemos un rewrite para quitárselo antes de enviarlo
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend_dev:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cualquier otra ruta, va a Vue
    location / {
        proxy_pass http://frontend_dev:5173;
        # Estas dos líneas son OBLIGATORIAS para el Hot-Reload de Vite (WebSockets)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}